syntax = "proto3";

package de.redstonecloud.api;

import "rc_generic.proto";

option java_package = "de.redstonecloud.api";
option java_outer_classname = "RCNodeProto";

service RCNodeService {
  rpc prepareServer(PrepareServer) returns (GenericResponse);
  rpc startServer(StartServer) returns (GenericResponse);
  rpc stopServer(StopServer) returns (GenericResponse);
  rpc executeCommand(ExecuteCommand) returns (GenericResponse);
}

message PrepareServer {
  string token = 1;
  string template = 2;
  string name = 3;
}

message StartServer {
  string token = 1;
  string server = 2;
}

message StopServer {
  string token = 1;
  string server = 2;
  bool kill = 3;
}

message ExecuteCommand {
  string token = 1;
  string server = 2;
  string command = 3;
}