syntax = "proto3";

package de.redstonecloud.api;

option java_package = "de.redstonecloud.api";
option java_outer_classname = "RCGenericProto";

message GenericResponse {
  bool success = 1;
  string message = 2;
}

message Empty {}

message Template {
  string name = 1;
  string data = 2;
}

message Type {
  string name = 1;
  string config = 2;
}

message KeyValuePair {
  string key = 1;
  string value = 2;
}